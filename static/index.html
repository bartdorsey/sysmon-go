<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Monitor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>&#128421; System Monitor</h1>
    <div class="controls">
      <label class="control-label">Refresh
        <select id="rate-select" class="rate-select">
          <option value="1000">1 s</option>
          <option value="2000">2 s</option>
          <option value="5000">5 s</option>
          <option value="10000">10 s</option>
          <option value="30000">30 s</option>
        </select>
      </label>
      <div class="status"><span class="dot"></span>Live</div>
    </div>
  </header>
  <div class="sys-grid" id="sys-grid"><div class="msg">Loading&hellip;</div></div>
  <div class="section-title">Filesystems</div>
  <div class="grid" id="grid"><div class="msg">Loading&hellip;</div></div>
  <script src="/app.js"></script>
</body>
</html>
